<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>완벽한 원 그리기</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 100vw; height: 100vh; overflow: hidden;
    background: #f5f0e8;
    font-family: 'Segoe UI', sans-serif;
    display: flex; flex-direction: column;
  }

  /* 상단 헤더 */
  #header {
    background: #2c2c2c;
    color: #fff;
    padding: 10px 24px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    z-index: 10;
  }
  #header h1 { font-size: 1.2rem; letter-spacing: 1px; }
  #header .hint { font-size: 0.8rem; color: #aaa; }
  #clearBtn {
    background: #e74c3c; color: #fff; border: none;
    padding: 6px 16px; border-radius: 6px; cursor: pointer;
    font-size: 0.85rem; transition: background 0.2s;
  }
  #clearBtn:hover { background: #c0392b; }

  /* 메인 레이아웃 */
  #main {
    display: flex; flex: 1; overflow: hidden;
  }

  /* 캔버스 영역 */
  #canvasWrap {
    flex: 1; position: relative;
    background: #fafaf5;
    background-image:
      linear-gradient(rgba(180,180,160,0.15) 1px, transparent 1px),
      linear-gradient(90deg, rgba(180,180,160,0.15) 1px, transparent 1px);
    background-size: 40px 40px;
    border-right: 2px solid #ddd;
  }
  canvas {
    position: absolute; top: 0; left: 0;
    cursor: crosshair; touch-action: none;
  }

  /* 결과 오버레이 */
  #resultOverlay {
    display: none;
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255,255,255,0.95);
    border: 3px solid #2c2c2c;
    border-radius: 16px;
    padding: 28px 36px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    z-index: 20;
    min-width: 200px;
  }
  #resultOverlay.show { display: block; animation: popIn 0.35s ease; }
  @keyframes popIn {
    from { transform: translate(-50%,-50%) scale(0.7); opacity: 0; }
    to   { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
  }
  #scoreLabel { font-size: 1rem; color: #555; margin-bottom: 6px; }
  #scoreValue { font-size: 3.5rem; font-weight: 900; line-height: 1; }
  #gradeLabel { font-size: 1.3rem; font-weight: 700; margin: 8px 0 4px; }
  #scoreDetail { font-size: 0.78rem; color: #777; margin-top: 6px; }

  /* 사이드바 */
  #sidebar {
    width: 280px; min-width: 220px;
    background: #fff;
    display: flex; flex-direction: column;
    padding: 16px;
    overflow-y: auto;
    box-shadow: -2px 0 8px rgba(0,0,0,0.05);
  }
  #sidebar h2 {
    font-size: 1rem; color: #333; margin-bottom: 12px;
    border-bottom: 2px solid #e0e0e0; padding-bottom: 6px;
    letter-spacing: 0.5px;
  }

  /* 현재 점수 카드 */
  #currentCard {
    background: linear-gradient(135deg, #2c2c2c, #555);
    color: #fff; border-radius: 10px;
    padding: 14px 16px; margin-bottom: 16px;
    text-align: center;
  }
  #currentCard .label { font-size: 0.75rem; opacity: 0.7; }
  #currentCard .val { font-size: 2rem; font-weight: 900; }
  #currentCard .grade { font-size: 0.9rem; margin-top: 2px; }

  /* 상위 점수 테이블 */
  #rankTable {
    width: 100%; border-collapse: collapse;
    font-size: 0.82rem;
  }
  #rankTable thead tr {
    background: #2c2c2c; color: #fff;
  }
  #rankTable th {
    padding: 6px 8px; text-align: center; font-weight: 600;
  }
  #rankTable td {
    padding: 5px 8px; text-align: center;
    border-bottom: 1px solid #eee;
  }
  #rankTable tr:nth-child(even) td { background: #f9f9f9; }
  #rankTable tr.highlight td {
    background: #fff9c4 !important; font-weight: 700;
  }
  .rank-medal { font-size: 1rem; }

  /* 등급 뱃지 */
  .grade-badge {
    display: inline-block;
    padding: 1px 7px; border-radius: 999px;
    font-size: 0.75rem; font-weight: 700;
    color: #fff;
  }
  .g-S  { background: #f39c12; }
  .g-A  { background: #27ae60; }
  .g-B  { background: #2980b9; }
  .g-C  { background: #8e44ad; }
  .g-D  { background: #7f8c8d; }
  .g-F  { background: #c0392b; }

  #noScore { color: #aaa; font-size: 0.82rem; text-align: center; padding: 16px 0; }
</style>
</head>
<body>

<div id="header">
  <h1>⭕ 완벽한 원 그리기</h1>
  <span class="hint">마우스 또는 터치로 원을 그려보세요!</span>
  <button id="clearBtn">🗑 다시 그리기</button>
</div>

<div id="main">
  <div id="canvasWrap">
    <canvas id="c"></canvas>
    <div id="resultOverlay">
      <div id="scoreLabel">원의 완성도</div>
      <div id="scoreValue">—</div>
      <div id="gradeLabel">—</div>
      <div id="scoreDetail"></div>
    </div>
  </div>

  <div id="sidebar">
    <div id="currentCard">
      <div class="label">현재 점수</div>
      <div class="val" id="curVal">—</div>
      <div class="grade" id="curGrade">원을 그려보세요</div>
    </div>

    <h2>🏆 베스트 10</h2>
    <div id="noScore">아직 기록이 없습니다</div>
    <table id="rankTable" style="display:none">
      <thead>
        <tr>
          <th>순위</th>
          <th>점수</th>
          <th>등급</th>
          <th>진원율</th>
        </tr>
      </thead>
      <tbody id="rankBody"></tbody>
    </table>
  </div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('canvasWrap');

let drawing = false, pts = [];
let scores = [];
let lastHighlightIdx = -1;

function resize() {
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
}
resize();
window.addEventListener('resize', () => { resize(); redrawLast(); });

// ── 그리기 ──
function getPos(e) {
  const r = canvas.getBoundingClientRect();
  if (e.touches) return { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top };
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

canvas.addEventListener('mousedown',  start);
canvas.addEventListener('mousemove',  move);
canvas.addEventListener('mouseup',    end);
canvas.addEventListener('mouseleave', end);
canvas.addEventListener('touchstart', e => { e.preventDefault(); start(e); }, { passive: false });
canvas.addEventListener('touchmove',  e => { e.preventDefault(); move(e);  }, { passive: false });
canvas.addEventListener('touchend',   e => { e.preventDefault(); end(e);   }, { passive: false });

function start(e) {
  drawing = true; pts = [];
  hideResult();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const p = getPos(e);
  pts.push(p);
  ctx.beginPath(); ctx.moveTo(p.x, p.y);
  ctx.strokeStyle = '#2c2c2c'; ctx.lineWidth = 2.5;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
}

function move(e) {
  if (!drawing) return;
  const p = getPos(e);
  pts.push(p);
  ctx.lineTo(p.x, p.y);
  ctx.stroke();
  ctx.beginPath(); ctx.moveTo(p.x, p.y);
}

function end() {
  if (!drawing || pts.length < 20) { drawing = false; return; }
  drawing = false;
  evaluate();
}

// ── 평가 ──
function evaluate() {
  // 중심 = 평균
  let cx = 0, cy = 0;
  pts.forEach(p => { cx += p.x; cy += p.y; });
  cx /= pts.length; cy /= pts.length;

  // 각 점의 반지름
  const radii = pts.map(p => Math.hypot(p.x - cx, p.y - cy));
  const rMean = radii.reduce((a, b) => a + b, 0) / radii.length;
  const rMax  = Math.max(...radii);
  const rMin  = Math.min(...radii);

  // 1) 진원율 — 반지름 표준편차/평균 (CoV), 제곱 패널티
  const variance = radii.reduce((s, r) => s + (r - rMean) ** 2, 0) / radii.length;
  const stdDev = Math.sqrt(variance);
  const cov = stdDev / rMean; // 0이 완벽
  const circularity = Math.max(0, 1 - Math.pow(cov * 3.5, 1.6));

  // 2) 폐합율 — 시작·끝 거리, 반지름 대비 엄격 패널티
  const gap = Math.hypot(pts[0].x - pts[pts.length-1].x, pts[0].y - pts[pts.length-1].y);
  const gapRatio = gap / (rMean * 2);
  const closeness = Math.max(0, 1 - Math.pow(gapRatio * 4, 1.8));

  // 3) 각도 균등 분포 — 360° 전체를 고르게 그렸는가
  //    36개 구간(10°씩)으로 나눠 빈 구간 & 편중도 체크
  const BINS = 36;
  const binCount = new Array(BINS).fill(0);
  pts.forEach(p => {
    let a = Math.atan2(p.y - cy, p.x - cx); // -π ~ π
    if (a < 0) a += 2 * Math.PI;
    const bin = Math.floor(a / (2 * Math.PI / BINS)) % BINS;
    binCount[bin]++;
  });
  const filledBins = binCount.filter(v => v > 0).length;
  const coverage = Math.pow(filledBins / BINS, 2.5); // 빈 구간에 민감

  // 4) 이심률 — 타원 여부 (가로/세로 비율)
  const xs = pts.map(p => p.x), ys = pts.map(p => p.y);
  const w = Math.max(...xs) - Math.min(...xs);
  const h = Math.max(...ys) - Math.min(...ys);
  const ratio = w > h ? h / w : w / h;
  const eccentricity = Math.pow(ratio, 2.0); // 조금만 찌그러져도 큰 감점

  // 5) 국소 곡률 일관성 — 곡률 변화(울퉁불퉁함) 감지
  //    연속된 3점의 곡률 반지름을 계산해 분산 측정
  const localR = [];
  for (let i = 2; i < pts.length - 2; i += 3) {
    const ax = pts[i-1].x - pts[i].x, ay = pts[i-1].y - pts[i].y;
    const bx = pts[i+1].x - pts[i].x, by = pts[i+1].y - pts[i].y;
    const cross = ax * by - ay * bx;
    if (Math.abs(cross) > 1e-6) {
      const lA = Math.hypot(ax, ay), lB = Math.hypot(bx, by);
      const chord = Math.hypot(pts[i+1].x - pts[i-1].x, pts[i+1].y - pts[i-1].y);
      const r = (lA * lB * chord) / (2 * Math.abs(cross));
      if (r < rMean * 10) localR.push(r);
    }
  }
  let smoothness = 0.5;
  if (localR.length > 5) {
    const rAvg = localR.reduce((a, b) => a + b, 0) / localR.length;
    const rStd = Math.sqrt(localR.reduce((s, r) => s + (r - rAvg) ** 2, 0) / localR.length);
    smoothness = Math.max(0, 1 - Math.pow(rStd / rMean, 0.9));
  }

  // ── 종합 점수 (가중합 후 지수 보정으로 고득점 희소성 확보) ──
  const raw = circularity * 0.35 + closeness * 0.20 + coverage * 0.15 + eccentricity * 0.15 + smoothness * 0.15;
  // 제곱 보정: 0.9 raw → ~81점, 0.95 raw → ~90점, 0.99 raw → ~98점
  const pct = Math.min(100, Math.max(0, Math.round(Math.pow(raw, 1.6) * 100 * 10) / 10));

  // 등급 — 기준 대폭 상향
  const grade = pct >= 95 ? 'S' : pct >= 85 ? 'A' : pct >= 72 ? 'B' : pct >= 55 ? 'C' : pct >= 38 ? 'D' : 'F';
  const emoji = pct >= 95 ? '🏅' : pct >= 85 ? '⭐' : pct >= 72 ? '👍' : pct >= 55 ? '😊' : pct >= 38 ? '😅' : '😭';
  const msg   = pct >= 95 ? '거의 완벽합니다!' : pct >= 85 ? '꽤 잘 그렸어요!' : pct >= 72 ? '나쁘지 않아요!' : pct >= 55 ? '평균 수준이에요.' : pct >= 38 ? '많이 부족해요.' : '원이 아닌 것 같아요…';

  // 완벽한 원 오버레이
  drawPerfectCircle(cx, cy, rMean);

  showResult(pct, grade, emoji, msg, circularity, closeness, smoothness);
  addScore(pct, grade, Math.round(circularity * 1000) / 10);
}

function drawPerfectCircle(cx, cy, r) {
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(231,76,60,0.55)';
  ctx.lineWidth = 2; ctx.setLineDash([6, 4]);
  ctx.stroke(); ctx.setLineDash([]);

  // 중심점
  ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(231,76,60,0.7)'; ctx.fill();
}

// ── 결과 표시 ──
function showResult(score, grade, emoji, msg, circ, close2, sm) {
  const ov = document.getElementById('resultOverlay');
  const colors = { S:'#f39c12', A:'#27ae60', B:'#2980b9', C:'#8e44ad', D:'#7f8c8d', F:'#c0392b' };
  document.getElementById('scoreValue').textContent = score.toFixed(1);
  document.getElementById('scoreValue').style.color = colors[grade] || '#333';
  document.getElementById('gradeLabel').textContent = emoji + ' ' + grade + '등급 — ' + msg;
  document.getElementById('scoreDetail').textContent = `진원율 ${(circ*100).toFixed(1)}% · 폐합 ${(close2*100).toFixed(1)}% · 곡률 ${(sm*100).toFixed(1)}%`;
  ov.className = 'show';

  // 사이드바 현재 점수
  document.getElementById('curVal').textContent = score.toFixed(1);
  document.getElementById('curGrade').textContent = emoji + ' ' + grade + '등급';
}

function hideResult() {
  document.getElementById('resultOverlay').className = '';
}

// ── 점수 기록 ──
function addScore(score, grade, circ) {
  scores.push({ score, grade, circ });
  scores.sort((a, b) => b.score - a.score);
  lastHighlightIdx = scores.findIndex(s => s === scores[0] && scores.filter(x => x.score === s.score).length > 0);
  // 최신 점수 하이라이트
  lastHighlightIdx = scores.findIndex(s => s.score === score && s.circ === circ);
  if (scores.length > 10) scores = scores.slice(0, 10);
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('rankBody');
  const noScore = document.getElementById('noScore');
  const table = document.getElementById('rankTable');

  if (scores.length === 0) { noScore.style.display='block'; table.style.display='none'; return; }
  noScore.style.display = 'none'; table.style.display = 'table';

  const medals = ['🥇','🥈','🥉'];
  const gClass = { S:'g-S', A:'g-A', B:'g-B', C:'g-C', D:'g-D', F:'g-F' };

  tbody.innerHTML = scores.map((s, i) => `
    <tr class="${i === lastHighlightIdx ? 'highlight' : ''}">
      <td>${medals[i] || (i+1)}</td>
      <td><strong>${s.score.toFixed(1)}</strong></td>
      <td><span class="grade-badge ${gClass[s.grade]}">${s.grade}</span></td>
      <td>${s.circ.toFixed(1)}%</td>
    </tr>
  `).join('');
}

function redrawLast() {}

document.getElementById('clearBtn').addEventListener('click', () => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  hideResult();
  lastHighlightIdx = -1;
  renderTable();
});
</script>
</body>
</html>
